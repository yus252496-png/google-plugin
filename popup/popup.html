<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>CNBC News Collector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <h1>CNBC 新闻采集器</h1>
        <button id="closeBtn" class="close-btn" title="关闭窗口">&times;</button>
      </div>
      <p class="subtitle">获取 CNBC 世界新闻，翻译为中文并导出 Word 文档</p>
    </header>

    <div class="controls">
      <div class="input-group">
        <label for="hours">获取过去</label>
        <input type="number" id="hours" min="1" max="168" value="24">
        <label>小时内的新闻</label>
      </div>
      <button id="fetchBtn" class="btn btn-primary">开始获取</button>
    </div>

    <div class="settings-section">
      <button id="settingsToggle" class="settings-toggle">⚙ 翻译设置</button>
      <div id="settingsPanel" class="settings-panel hidden">
        <div class="input-group">
          <label for="transProvider">翻译服务</label>
          <select id="transProvider">
            <option value="google">Google 翻译（需VPN，无需配置）</option>
            <option value="baidu">百度翻译（国内可用，需密钥）</option>
          </select>
        </div>
        <div id="baiduConfig" class="baidu-config">
          <p class="settings-hint">申请地址：<a href="https://api.fanyi.baidu.com/register" target="_blank">api.fanyi.baidu.com</a> → 通用翻译 API（免费100万字符/月）</p>
          <div class="input-group">
            <label for="baiduAppId">APP ID</label>
            <input type="text" id="baiduAppId" placeholder="请输入 APP ID">
          </div>
          <div class="input-group">
            <label for="baiduSecret">密钥 (Secret Key)</label>
            <input type="password" id="baiduSecret" placeholder="请输入密钥">
          </div>
        </div>
        <button id="saveSettingsBtn" class="btn btn-primary">保存设置</button>
        <span id="settingsStatus" class="settings-status"></span>
      </div>
    </div>

    <div id="status" class="status"></div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span id="loadingText">正在处理...</span>
    </div>

    <div id="preview" class="preview hidden"></div>

    <div id="downloadSection" class="download-section hidden">
      <button id="downloadBtn" class="btn btn-success">下载 Word 文档</button>
    </div>

    <div id="emptyState" class="empty-state">
      <p>设置获取时间范围，点击"开始获取"按钮获取 CNBC 热点新闻</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
